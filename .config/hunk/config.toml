theme = "custom"
mode = "auto"
watch = true
line_numbers = true
wrap_lines = true

[custom_theme]
base = "github-dark-default"
label = "GitHub Dark"
background = "#010409"
contextBg = "#010409"
lineNumberBg = "#010409"
text = "#e6edf3"
muted = "#6e7681"
border = "#484f58"
accent = "#58a6ff"
accentMuted = "#79c0ff"
addedBg = "#0d2817"
removedBg = "#341c1e"
addedContentBg = "#174322"
removedContentBg = "#5a2e2e"
addedSignColor = "#3fb950"
removedSignColor = "#ff7b72"
lineNumberFg = "#6e7681"
selectedHunk = "#264f78"
badgeAdded = "#3fb950"
badgeRemoved = "#ff7b72"
badgeNeutral = "#6e7681"
fileNew = "#3fb950"
fileDeleted = "#ff7b72"
fileRenamed = "#d29922"
fileModified = "#58a6ff"
fileUntracked = "#6e7681"
noteBorder = "#bc8cff"
noteTitleText = "#e6edf3"

[custom_theme.syntax]
default = "#e6edf3"
keyword = "#ff7b72"
string = "#79c0ff"
comment = "#6e7681"
number = "#79c0ff"
function = "#d2a8ff"
property = "#79c0ff"
type = "#e3b341"
variable = "#e6edf3"
operator = "#ff7b72"
punctuation = "#b1bac4"
